name: PetClinic E2E Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t petclinic-app .


  e2e-tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # LOAD DOCKER IMAGE FROM BUILD JOB
      # -------------------------
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: petclinic-image

      - name: Load Docker image
        run: docker load < image.tar

      # -------------------------
      # RUN APP
      # -------------------------
      - name: Run container
        run: docker run -d -p 8080:8080 --name petclinic petclinic-app

      - name: Wait for app
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8080; do sleep 2; done'

      - name: Smoke test
        run: curl -f http://localhost:8080

      # -------------------------
      # NODE + PLAYWRIGHT
      # -------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        working-directory: ui-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui-tests
        run: npx playwright install --with-deps

      # -------------------------
      # RUN TESTS WITH REPORT
      # -------------------------
      - name: Run Playwright tests
        working-directory: ui-tests
        run: npx playwright test --reporter=html

      # -------------------------
      # UPLOAD PLAYWRIGHT REPORT
      # -------------------------
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui-tests/playwright-report

      # -------------------------
      # CLEANUP
      # -------------------------
      - name: Stop container
        if: always()
        run: docker stop petclinic && docker rm petclinic

      - name: Show logs on failure
        if: failure()
        run: docker logs petclinic
