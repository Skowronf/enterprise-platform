name: PetClinic E2E Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: skowronf/enterprise-platform

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build application
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx for cache
        uses: docker/setup-buildx-action@v4

      - name: Build image (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: petclinic:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cache Trivy DB
        uses: actions/cache@v6
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: petclinic:ci
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker tag petclinic:ci ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          docker push ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        shard: [ 1, 2, 3 ]

    env:
      TAG: sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start environment (Docker Compose)
        run: docker compose up -d

      - name: Wait for application
        run: |
          timeout 60 bash -c 'until curl -fs http://localhost:8080 > /dev/null; do sleep 2; done'

      - name: Smoke test
        run: curl -f http://localhost:8080

      - name: Show running services
        run: docker compose ps

      - name: Show application logs
        run: docker compose logs petclinic

      - name: Show containers
        run: docker ps -a

      - name: Show raw Docker logs
        run: |
          CONTAINER_ID=$(docker compose ps -q petclinic)
          echo "Container: $CONTAINER_ID"
          docker logs "$CONTAINER_ID"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ui-tests/package-lock.json

      - name: Install dependencies
        working-directory: ui-tests
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('ui-tests/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        working-directory: ui-tests
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ui-tests
        run: npx playwright test --reporter=html --shard=${{ matrix.shard }}/3

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ui-tests/playwright-report

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
