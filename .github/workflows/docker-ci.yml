name: PetClinic E2E Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: skowronf/enterprise-platform

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build application
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx for cache
        uses: docker/setup-buildx-action@v4

      - name: Build image (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: petclinic:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cache Trivy DB
        uses: actions/cache@v6
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: petclinic:ci
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker tag petclinic:ci ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          docker push ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        shard: [ 1, 2, 3 ]

    env:
      TAG: sha-${{ github.sha }}
      KUBECONFIG: ${{ github.workspace }}/kubeconfig

    steps:
      - uses: actions/checkout@v7

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.29.0

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Create kind cluster
        run: |
          kind create cluster --name petclinic-ci
          kind export kubeconfig --name petclinic-ci > $KUBECONFIG
          kubectl cluster-info

      - name: Load image into kind - replaces registry pull
        run: |
          docker pull ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          kind load docker-image ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} --name petclinic-ci

      - name: Show workspace
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f
          
      - name: Inject image tag into manifest (so it can be passed to k8s yaml files)
        run: |
          sed -i "s|REPLACE_ME|sha-${{ github.sha }}|g" k8s/petclinic.yml


      - name: Deploy PetClinic (K8s)
        run: |
          kubectl create namespace petclinic

          kubectl apply -n petclinic -f k8s/

          kubectl get pods -n petclinic


      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/petclinic -n petclinic --timeout=120s


      - name: Port forward app
        run: |
          kubectl port-forward svc/petclinic -n petclinic 8080:8080 &
          sleep 5
          
      - name: Check pod logs
        run: |
          kubectl logs deployment/petclinic -n petclinic  
          kubectl logs -n petclinic -l app=petclinic --tail=200

      - name: Print logs
        run: |
          POD=$(kubectl get pod -n petclinic -l app=petclinic -o jsonpath='{.items[0].metadata.name}')
          echo $POD
          kubectl logs $POD -n petclinic    

      - name: Check service endpoints
        run: |
          kubectl get svc -n petclinic
          kubectl get endpoints -n petclinic    


      - name: Smoke test
        run: curl -f http://localhost:8080


      - name: Show cluster state
        if: always()
        run: |
          kubectl get all -n petclinic
          kubectl describe pods -n petclinic


      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ui-tests/package-lock.json

      - name: Install dependencies
        working-directory: ui-tests
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('ui-tests/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: ui-tests
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ui-tests
        run: npx playwright test --reporter=html --shard=${{ matrix.shard }}/3

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ui-tests/playwright-report

      - name: Cleanup kind cluster
        if: always()
        run: |
          kind delete cluster --name petclinic-ci
