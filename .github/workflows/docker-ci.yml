name: PetClinic E2E Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: skowronf/enterprise-platform

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build application
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read
      packages: read

    env:
      TAG: sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start environment (Docker Compose)
        run: docker compose up -d

      - name: Wait for application
        run: |
          timeout 60 bash -c 'until curl -fs http://localhost:8080 > /dev/null; do sleep 2; done'

      - name: Smoke test
        run: curl -f http://localhost:8080

      - name: Show running services
        run: docker compose ps

      - name: Show application logs
        run: docker compose logs petclinic

      - name: Show containers
        run: docker ps -a

      - name: Show raw Docker logs
        run: |
          CONTAINER_ID=$(docker compose ps -q petclinic)
          echo "Container: $CONTAINER_ID"
          docker logs "$CONTAINER_ID"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        working-directory: ui-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui-tests
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ui-tests
        run: npx playwright test --reporter=html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui-tests/playwright-report

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
