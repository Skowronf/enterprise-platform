name: PetClinic E2E Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t $REGISTRY/$IMAGE_NAME:latest .

      - name: Push Docker image
        run: docker push $REGISTRY/$IMAGE_NAME:latest


  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Docker image
        run: docker pull ghcr.io/${{ github.repository_lower }}:latest

      - name: Run container
        run: docker run -d -p 8080:8080 --name petclinic ghcr.io/${{ github.repository_lower }}:latest

      - name: Wait for app
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8080; do sleep 2; done'

      - name: Smoke test
        run: curl -f http://localhost:8080

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        working-directory: ui-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui-tests
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ui-tests
        run: npx playwright test --reporter=html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui-tests/playwright-report

      - name: Stop container
        if: always()
        run: docker stop petclinic && docker rm petclinic

      - name: Show logs on failure
        if: failure()
        run: docker logs petclinic
