name: PetClinic Docker CI

on:
  push:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t petclinic-app .

      - name: Run container
        run: docker run -d -p 8080:8080 --name petclinic petclinic-app

      - name: Wait for app
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8080; do sleep 2; done'

      - name: Smoke test
        run: curl -f http://localhost:8080

      - name: Cleanup
        if: always()
        run: docker stop petclinic && docker rm petclinic

      - name: Show logs on failure
        if: failure()
        run: docker logs petclinic
