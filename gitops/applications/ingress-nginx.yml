apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ingress-nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.12.0

    helm:
      values: | #kind: DaemonSet since localhost:80 -> Kind node -> Ingress Controller Pod
        controller:
          kind: DaemonSet  

          hostPort:
            enabled: true

        admissionWebhooks:
          enabled: true
          patch:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
