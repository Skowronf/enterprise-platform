apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petclinic
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20" # Deploy applications and databases after observability so startup can be monitored.

spec:
  project: default

  source:
    repoURL: https://github.com/Skowronf/enterprise-platform
    targetRevision: main
    path: charts/petclinic-platform/charts/petclinic

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
