apiVersion: apps/v1
kind: Deployment # Makes a Pod with a label, then Service can find this pod using selector with same label
metadata:
  name: postgres
  namespace: petclinic # Pod will be made in same namespace as application
spec:
  replicas: 1 # Kubernetes will keep up one pod running, if it dies new one will be created
  selector:
    matchLabels: # Deployment finds Pod with this label, must be the same as label in template
      app: postgres
  template:
    metadata:
      labels:
        app: postgres # Each new Pod will get this label, used by Deployment and Service
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: petclinic
            - name: POSTGRES_USER
              value: petclinic
            - name: POSTGRES_PASSWORD
              value: petclinic


          readinessProbe: # If postgres is not ready, Service won't send traffic
            exec:
              command:
                - sh
                - -c
                - pg_isready -U petclinic
            initialDelaySeconds: 5
            periodSeconds: 30

          livenessProbe: # Check if postgres is alive, if not restart container
            exec:
              command:
                - sh
                - -c
                - pg_isready -U petclinic
            initialDelaySeconds: 20
            periodSeconds: 30

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
