apiVersion: v1
kind: ConfigMap
metadata:
  name: petclinic-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  petclinic-dashboard.json: |
    {
      "uid": "petclinic",
      "title": "Petclinic - Golden Signals",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "Request Rate",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count[5m]))",
              "legendFormat": "req/s"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Error Rate (5xx)",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[5m]))",
              "legendFormat": "errors/s"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Error Rate (%)",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "100 * sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[5m])) / sum(rate(http_server_requests_seconds_count[5m]))",
              "legendFormat": "%"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Latency (p95)",
          "gridPos": { "x": 0, "y": 16, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        }
      ]
    }
