apiVersion: v2
name: observability
description: Monitoring stack for PetClinic
type: application
version: 0.1.0

dependencies:
  - name: kube-prometheus-stack
    version: "75.6.0"
    repository: "https://prometheus-community.github.io/helm-charts"

  - name: grafana
    version: "8.13.0"
    repository: "https://grafana.github.io/helm-charts"

  - name: loki
    version: "6.30.1"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled

  - name: promtail
    version: "6.16.6"
    repository: "https://grafana.github.io/helm-charts"
    condition: promtail.enabled
