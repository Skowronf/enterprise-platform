apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petclinic
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Skowronf/enterprise-platform
    targetRevision: main
    path: charts/petclinic  # Path to Helm application folder

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
